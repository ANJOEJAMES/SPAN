services:
  - type: web
    name: span-blog-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    # Render free tier spins down after inactivity; upgrade plan to prevent cold starts
    envVars:
      - key: TURSO_DB_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
